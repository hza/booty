<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="5" fill="#0d1117"/>

  <!-- Crossbones (behind skull) -->
  <line x1="5" y1="29" x2="27" y2="19" stroke="#f0f0f0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="27" y1="29" x2="5" y2="19" stroke="#f0f0f0" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="5"  cy="29" r="2.5" fill="#f0f0f0"/>
  <circle cx="27" cy="29" r="2.5" fill="#f0f0f0"/>
  <circle cx="5"  cy="19" r="2.5" fill="#f0f0f0"/>
  <circle cx="27" cy="19" r="2.5" fill="#f0f0f0"/>

  <!-- Skull cranium -->
  <ellipse cx="16" cy="11" rx="9" ry="8" fill="#f0f0f0"/>
  <!-- Jaw -->
  <rect x="10" y="16" width="12" height="5" rx="1.5" fill="#f0f0f0"/>
  <!-- Eye sockets -->
  <circle cx="12.5" cy="10.5" r="2.5" fill="#0d1117"/>
  <circle cx="19.5" cy="10.5" r="2.5" fill="#0d1117"/>
  <!-- Nose cavity -->
  <ellipse cx="16" cy="14" rx="1.2" ry="1" fill="#0d1117"/>
  <!-- Teeth gaps -->
  <rect x="11.5" y="17.5" width="1.5" height="3" fill="#0d1117"/>
  <rect x="15.25" y="17.5" width="1.5" height="3" fill="#0d1117"/>
  <rect x="19"    y="17.5" width="1.5" height="3" fill="#0d1117"/>
</svg>
